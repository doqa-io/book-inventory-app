<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Inventory</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Book Inventory</h1>

    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Category</th>
          <th>Status</th>
          <th>Rate</th>
        </tr>
      </thead>
      <tbody>
        <tr class="read">
          <td>The Left Hand of Darkness</td>
          <td>Ursula K. Le Guin</td>
          <td>Science Fiction</td>
          <td><span class="status">Read</span></td>
          <td>
            <span class="rate one"><span></span><span></span><span></span></span>
          </td>
        </tr>
        <tr class="read">
          <td>Kindred</td>
          <td>Octavia E. Butler</td>
          <td>Historical</td>
          <td><span class="status">Read</span></td>
          <td>
            <span class="rate two"><span></span><span></span><span></span></span>
          </td>
        </tr>
        <tr class="read">
          <td>Gilead</td>
          <td>Marilynne Robinson</td>
          <td>Literary</td>
          <td><span class="status">Read</span></td>
          <td>
            <span class="rate three"><span></span><span></span><span></span></span>
          </td>
        </tr>
        <tr class="to-read">
          <td>The Name of the Rose</td>
          <td>Umberto Eco</td>
          <td>Mystery</td>
          <td><span class="status">To Read</span></td>
          <td><span class="rate"><span></span><span></span><span></span></span></td>
        </tr>
        <tr class="in-progress">
          <td>The Overstory</td>
          <td>Richard Powers</td>
          <td>Fiction</td>
          <td><span class="status">In Progress</span></td>
          <td><span class="rate"><span></span><span></span><span></span></span></td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
