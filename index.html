<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Book Inventory</title>
  <link href="styles.css" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="./src/logo_doqa.webp">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <h1>Book Inventory</h1>
  
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Category</th>
        <th>Status</th>
        <th>Rate</th>
      </tr>
    </thead>
    <tbody>
      <tr class="read">
        <td>Les Fourmis</td>
        <td>Bernard Werber</td>
        <td>Science Fiction</td>
        <td><span class="status">Read</span></td>
        <td><span class="rate three"><span></span><span></span><span></span></span></td>
      </tr>
      <tr class="to-read">
        <td>Culottées</td>
        <td>Pénélope Bagieu</td>
        <td>Graphic Novel</td>
        <td><span class="status">To Read</span></td>
        <td><span class="rate"><span></span><span></span><span></span></span></td>
      </tr>
      <tr class="in-progress">
        <td>Game Over</td>
        <td>Midam</td>
        <td>Comics</td>
        <td><span class="status">In Progress</span></td>
        <td><span class="rate"><span></span><span></span><span></span></span></td>
      </tr>
      <tr class="read">
        <td>Le Petit Prince</td>
        <td>Antoine de Saint-Exupéry</td>
        <td>Fiction</td>
        <td><span class="status">Read</span></td>
        <td><span class="rate two"><span></span><span></span><span></span></span></td>
      </tr>
      <tr class="read">
        <td>L'Étranger</td>
        <td>Albert Camus</td>
        <td>Philosophy</td>
        <td><span class="status">Read</span></td>
        <td><span class="rate one"><span></span><span></span><span></span></span></td>
      </tr>
    </tbody>
  </table>
</body>
</html>
